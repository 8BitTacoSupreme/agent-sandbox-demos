<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 630" font-family="Arial, sans-serif" font-size="13">

  <!-- Explicit white background so this renders correctly in dark-mode viewers -->
  <rect x="0" y="0" width="920" height="630" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F72">Agent sandboxing matrix</text>
  <text x="460" y="50" text-anchor="middle" font-size="12" fill="#666666">Pick any row. The sandbox boundary is the same. The wiring is just glue.</text>

  <!-- Header row -->
  <rect x="20" y="70" width="900" height="40" fill="#EFEFEC"/>
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">Env Manager</text>
  <text x="320" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">Binary Trust</text>
  <text x="320" y="103" text-anchor="middle" font-size="11" fill="#666666">(where binaries actually live)</text>
  <text x="500" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">Activation Hook</text>
  <text x="500" y="103" text-anchor="middle" font-size="11" fill="#666666">(how sbx prepare gets called)</text>
  <text x="690" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">macOS Boundary</text>
  <text x="850" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4F72">Linux Boundary</text>

  <!-- Row 1: Flox -->
  <text x="40" y="138" font-size="13" font-weight="600" fill="#2C2C2A">Flox</text>
  <text x="40" y="152" font-size="10" fill="#888888">(see sandflox)</text>
  <text x="320" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#1E8449">Strong</text>
  <text x="320" y="150" text-anchor="middle" font-size="11" fill="#333333">/nix/store input-addressed</text>
  <text x="500" y="135" text-anchor="middle" font-size="13" fill="#333333">flox activate hooks</text>
  <text x="500" y="150" text-anchor="middle" font-size="11" fill="#666666">native sandflox integration</text>
  <text x="690" y="138" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="152" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="138" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 2: devbox -->
  <text x="40" y="188" font-size="13" font-weight="600" fill="#2C2C2A">devbox</text>
  <text x="320" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#1E8449">Strong</text>
  <text x="320" y="200" text-anchor="middle" font-size="11" fill="#333333">/nix/store input-addressed</text>
  <text x="500" y="185" text-anchor="middle" font-size="13" fill="#333333">init_hook in devbox.json</text>
  <text x="500" y="200" text-anchor="middle" font-size="11" fill="#666666">scripts: { agent: ... }</text>
  <text x="690" y="188" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="202" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="188" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 3: Determinate Nix -->
  <text x="40" y="238" font-size="13" font-weight="600" fill="#2C2C2A">Determinate Nix</text>
  <text x="40" y="252" font-size="10" fill="#888888">(modern flakes)</text>
  <text x="320" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#1E8449">Strong</text>
  <text x="320" y="250" text-anchor="middle" font-size="11" fill="#333333">/nix/store input-addressed</text>
  <text x="500" y="235" text-anchor="middle" font-size="13" fill="#333333">flake.nix shellHook</text>
  <text x="500" y="250" text-anchor="middle" font-size="11" fill="#666666">nix develop or use flake</text>
  <text x="690" y="238" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="252" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="238" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 4: direnv + nix-shell -->
  <text x="40" y="288" font-size="13" font-weight="600" fill="#2C2C2A">direnv + nix-shell</text>
  <text x="40" y="302" font-size="10" fill="#888888">(legacy shell.nix)</text>
  <text x="320" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#1E8449">Strong</text>
  <text x="320" y="300" text-anchor="middle" font-size="11" fill="#333333">/nix/store input-addressed</text>
  <text x="500" y="285" text-anchor="middle" font-size="13" fill="#333333">.envrc on cd</text>
  <text x="500" y="300" text-anchor="middle" font-size="11" fill="#666666">use_nix + PATH_add</text>
  <text x="690" y="288" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="302" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="288" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 5: mise -->
  <text x="40" y="338" font-size="13" font-weight="600" fill="#2C2C2A">mise</text>
  <text x="320" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#B7950B">Medium</text>
  <text x="320" y="350" text-anchor="middle" font-size="11" fill="#333333">~/.local/share/mise versioned</text>
  <text x="500" y="335" text-anchor="middle" font-size="13" fill="#333333">[hooks] enter</text>
  <text x="500" y="350" text-anchor="middle" font-size="11" fill="#666666">shims=false required</text>
  <text x="690" y="338" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="352" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="338" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 6: asdf -->
  <text x="40" y="388" font-size="13" font-weight="600" fill="#2C2C2A">asdf</text>
  <text x="40" y="402" font-size="10" fill="#888888">(same as mise)</text>
  <text x="320" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#B7950B">Medium</text>
  <text x="320" y="400" text-anchor="middle" font-size="11" fill="#333333">~/.asdf/installs versioned</text>
  <text x="500" y="385" text-anchor="middle" font-size="13" fill="#333333">activate.sh on cd</text>
  <text x="500" y="400" text-anchor="middle" font-size="11" fill="#666666">PATH-prepend install dirs</text>
  <text x="690" y="388" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="402" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="388" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 7: direnv (bare) -->
  <text x="40" y="438" font-size="13" font-weight="600" fill="#2C2C2A">direnv (bare)</text>
  <text x="320" y="435" text-anchor="middle" font-size="13" font-weight="600" fill="#922B21">Weak</text>
  <text x="320" y="450" text-anchor="middle" font-size="11" fill="#333333">whatever's on PATH</text>
  <text x="500" y="435" text-anchor="middle" font-size="13" fill="#333333">.envrc on cd</text>
  <text x="500" y="450" text-anchor="middle" font-size="11" fill="#666666">no managed binaries</text>
  <text x="690" y="438" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="452" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="438" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Row 8: plain shell -->
  <text x="40" y="488" font-size="13" font-weight="600" fill="#2C2C2A">plain shell</text>
  <text x="40" y="502" font-size="10" fill="#888888">(brew / apt)</text>
  <text x="320" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#922B21">Weak</text>
  <text x="320" y="500" text-anchor="middle" font-size="11" fill="#333333">/opt/homebrew or /usr/bin</text>
  <text x="500" y="485" text-anchor="middle" font-size="13" fill="#333333">activate.sh manual</text>
  <text x="500" y="500" text-anchor="middle" font-size="11" fill="#666666">no env manager at all</text>
  <text x="690" y="488" text-anchor="middle" font-size="13" fill="#333333">sandbox-exec</text>
  <text x="690" y="502" text-anchor="middle" font-size="10" fill="#888888">SBPL profile</text>
  <text x="850" y="488" text-anchor="middle" font-size="13" fill="#333333">bwrap + Landlock</text>

  <!-- Grid lines (drawn last so they're on top) -->
  <g stroke="#D3D1C7" stroke-width="0.5" fill="none">
    <!-- Verticals -->
    <line x1="20"  y1="70"  x2="20"  y2="510"/>
    <line x1="220" y1="70"  x2="220" y2="510"/>
    <line x1="420" y1="70"  x2="420" y2="510"/>
    <line x1="600" y1="70"  x2="600" y2="510"/>
    <line x1="780" y1="70"  x2="780" y2="510"/>
    <line x1="920" y1="70"  x2="920" y2="510"/>
    <!-- Horizontals -->
    <line x1="20"  y1="70"  x2="920" y2="70"/>
    <line x1="20"  y1="110" x2="920" y2="110"/>
    <line x1="20"  y1="160" x2="920" y2="160"/>
    <line x1="20"  y1="210" x2="920" y2="210"/>
    <line x1="20"  y1="260" x2="920" y2="260"/>
    <line x1="20"  y1="310" x2="920" y2="310"/>
    <line x1="20"  y1="360" x2="920" y2="360"/>
    <line x1="20"  y1="410" x2="920" y2="410"/>
    <line x1="20"  y1="460" x2="920" y2="460"/>
    <line x1="20"  y1="510" x2="920" y2="510"/>
  </g>

  <!-- Footer takeaway box -->
  <rect x="20" y="530" width="900" height="80" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="40" y="555" font-size="13" font-weight="700" fill="#854F0B">The boundary is the same in every row.</text>
  <text x="40" y="575" font-size="12" fill="#633806">sandbox-exec on macOS, bwrap + Landlock on Linux. Shipped with the OS.</text>
  <text x="40" y="593" font-size="12" fill="#633806">What changes by row is the wiring (the activation hook) and the trust property of the binaries it allowlists.</text>
</svg>
